<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ stotram_title }} - Stotra Reader</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .meaning-wrapper, .language-wrapper, .theme-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toggle-title {
            font-size: 0.7rem;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
        }
        /* Specific colors for the meaning toggle */
        #meaning-on:checked + .on-label { background-color: #28a745 !important; color: white !important; border-color: #28a745 !important; }
        #meaning-off:checked + .off-label { background-color: #dc3545 !important; color: white !important; border-color: #dc3545 !important; }
    </style>
</head>
<body>
    <header class="app-header">
        <h1>Sanatana Stotra Sangrahah</h1>
    </header>

    <div class="flashcard-page-container">
        <div class="controls-row">
            <a href="/" class="home-link" title="Back to Home"><span class="nav-arrow">←</span> HOME</a>
            <div class="settings-controls">
                <div class="language-wrapper">
                    <span class="toggle-title">Script</span>
                    <div class="language-toggle">
                        <input type="radio" id="lang-sanskrit" name="selected_language" value="sanskrit" {% if selected_language == "sanskrit" %}checked{% endif %} onchange="setLanguage(this.value)">
                        <label for="lang-sanskrit">S</label>
                        <input type="radio" id="lang-malayalam" name="selected_language" value="malayalam" {% if selected_language == "malayalam" %}checked{% endif %} onchange="setLanguage(this.value)">
                        <label for="lang-malayalam">M</label>
                    </div>
                </div>
                <div class="meaning-wrapper">
                    <span class="toggle-title">Meaning</span>
                    <div class="language-toggle">
                        <input type="radio" id="meaning-off" name="show_meaning" value="false" {% if show_meaning == "false" %}checked{% endif %} onchange="setMeaning(false)">
                        <label for="meaning-off" class="off-label">OFF</label>
                        <input type="radio" id="meaning-on" name="show_meaning" value="true" {% if show_meaning == "true" %}checked{% endif %} onchange="setMeaning(true)">
                        <label for="meaning-on" class="on-label">ON</label>
                    </div>
                </div>
            </div>
            <div class="theme-wrapper">
                <span class="toggle-title">Theme</span>
                <div class="language-toggle">
                    <input type="radio" id="theme-light" name="theme" value="light" {% if theme == "light" %}checked{% endif %} onchange="setTheme('light')">
                    <label for="theme-light" title="Light Theme">☀️</label>
                    <input type="radio" id="theme-dark" name="theme" value="dark" {% if theme == "dark" %}checked{% endif %} onchange="setTheme('dark')">
                    <label for="theme-dark" title="Dark Theme">🌙</label>
                </div>
            </div>
        </div>

        <!-- Hidden YouTube Player -->
        <div id="yt-player" style="display: none;"></div>

        <div class="flashcard">
            <div id="verse-content">
                <div class="card-header">
                    <div class="verse-id">#{{ current_id }}</div>
                    <button class="listen-btn" onclick="speakText()" title="Listen to Sanskrit">🔊</button>
                </div>
                <div class="script-text">{% if selected_language == "sanskrit" %}{{ verse.sanskrit }}{% else %}{{ verse.malayalam }}{% endif %}</div>
                <div class="english-text">{{ verse.english }}</div>
                <div class="meaning-text" style="display: {% if show_meaning == 'true' %}block{% else %}none{% endif %};">{{ verse.meaning }}</div>
            </div>
        </div>

        <div class="navigation-buttons"></div>
    </div>

    <script>
        const stotramId = "{{ stotram_id }}";
        const stotramData = {{ stotram_data | tojson }};
        let currentId = {{ current_id }};
        const totalVerses = {{ total_verses }};
        let lang = "{{ selected_language }}";
        let showMeaning = "{{ show_meaning }}";
        let theme = "{{ theme }}";
        let currentSanskrit = {{ verse.sanskrit | tojson }};
        let selectedVoice = null;
        let currentAudio = null;
        let ytTimer = null;
        let ytPlayer = null;
        const youtubeId = "{{ stotram_data.youtube_id }}";

        // Load YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            if (!youtubeId) return;
            ytPlayer = new YT.Player('yt-player', {
                height: '0',
                width: '0',
                videoId: youtubeId,
                playerVars: { 'autoplay': 0, 'controls': 0, 'modestbranding': 1 },
                events: {
                    'onReady': () => console.log("YouTube Player Initialized for ID:", youtubeId)
                }
            });
        }

        function setupSpeechVoice() {
            if ('speechSynthesis' in window) {
                const voices = window.speechSynthesis.getVoices();
                // Prioritize Sanskrit (sa-), then Marathi (mr-), then Hindi (hi-)
                selectedVoice = voices.find(v => v.lang.toLowerCase().startsWith('sa-')) ||
                                voices.find(v => v.lang.toLowerCase().startsWith('mr-')) ||
                                voices.find(v => v.lang.toLowerCase().startsWith('hi-'));
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = setupSpeechVoice;
            setupSpeechVoice();
        }

        function fetchVerse(vid) {
            // Stop any ongoing speech when navigating away from the current content
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            // Stop YouTube if navigating
            if (ytPlayer && ytPlayer.pauseVideo) {
                ytPlayer.pauseVideo();
            }
            if (ytTimer) {
                clearTimeout(ytTimer);
                ytTimer = null;
            }
            // Stop any ongoing MP3 playback
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            const container = document.getElementById('verse-content');
            container.classList.add('verse-fade-out');

            let verse;
            const count = stotramData.verses.length;

            if (vid === 0) {
                verse = {
                    sanskrit: stotramData.landing_san, malayalam: stotramData.landing_mal,
                    english: "Dhyanam", meaning: "Opening Prayers"
                };
            } else if (vid === count + 1) {
                verse = {
                    sanskrit: stotramData.end_san, malayalam: stotramData.end_mal,
                    english: "Conclusion", meaning: "Closing Prayers"
                };
            } else {
                verse = stotramData.verses[vid - 1];
            }

            currentId = vid;
            currentSanskrit = verse.sanskrit;

            setTimeout(() => {
                // Update text content
                document.querySelector('.verse-id').textContent = `#${currentId}`;
                document.querySelector('.script-text').textContent = lang === 'sanskrit' ? verse.sanskrit : verse.malayalam;
                document.querySelector('.english-text').textContent = verse.english;
                document.querySelector('.meaning-text').textContent = verse.meaning;
                document.querySelector('.meaning-text').style.display = showMeaning === 'true' ? 'block' : 'none';
                
                // Update URL without page refresh
                const url = `/stotram/${stotramId}/flashcard/${vid}?lang=${lang}&meaning=${showMeaning}&theme=${theme}`;
                window.history.pushState({vid, lang}, '', url);
                container.classList.remove('verse-fade-out');
            }, 150);
        }

        async function speakText() {
            // Stop any ongoing speech or audio immediately
            if (ytTimer) {
                clearTimeout(ytTimer);
                ytTimer = null;
            }
            if (currentAudio) currentAudio.pause();
            currentAudio = null;
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            
            const count = stotramData.verses.length;
            let verse;
            if (currentId === 0) verse = { start_time: 0 };
            else if (currentId === count + 1) verse = { start_time: 1680 }; // Example end time
            else verse = stotramData.verses[currentId - 1];

            // 1. Priority: YouTube Sync
            if (ytPlayer && verse.start_time !== undefined) {
                console.log(`Seeking YouTube to ${verse.start_time}s`);
                ytPlayer.seekTo(verse.start_time, true);
                ytPlayer.playVideo();

                if (verse.end_time !== undefined) {
                    const duration = (verse.end_time - verse.start_time) * 1000;
                    ytTimer = setTimeout(() => {
                        ytPlayer.pauseVideo();
                    }, duration);
                }
                return;
            }

            // 2. Secondary: Local MP3 Files
            let audioFile;
            if (currentId === 0) {
                audioFile = "landing.mp3";
            } else if (currentId === count + 1) {
                audioFile = "conclusion.mp3";
            } else {
                const coupletId = Math.ceil(currentId / 2);
                audioFile = `${coupletId}.mp3`;
            }

            const audioUrl = `/static/audio/${stotramId}/${audioFile}`;
            
            // Check if file exists before trying to play to maintain user gesture context
            const check = await fetch(audioUrl, { method: 'HEAD' }).catch(() => ({ ok: false }));
            
            if (check.ok) {
                currentAudio = new Audio(audioUrl);
                currentAudio.play().catch(() => playTTSFallback());
            } else {
                console.warn(`Local audio not found at ${audioUrl}. Falling back to browser TTS.`);
                playTTSFallback();
            }
        }

        function playTTSFallback() {
            if (!('speechSynthesis' in window)) {
                console.error("TTS not supported.");
                return;
            }

            window.speechSynthesis.resume();
            if (!currentSanskrit) return;

            // Clean text: replace Dandams with commas to create natural breathing pauses
            const textToSpeak = currentSanskrit.replace(/[।॥]/g, ',');
            const utterance = new SpeechSynthesisUtterance(textToSpeak);

            if (selectedVoice) {
                utterance.voice = selectedVoice;
                utterance.lang = selectedVoice.lang;
            } else {
                utterance.lang = 'sa-IN';
            }

            utterance.rate = 0.8; // Slightly slower for meditative clarity
            utterance.pitch = 1;

            // 100ms delay ensures the cancel command is processed by hardware
            setTimeout(() => {
                window.speechSynthesis.speak(utterance);
            }, 100);
        }

        function setLanguage(newLang) {
            lang = newLang;
            fetchVerse(currentId);
        }

        function setTheme(newTheme) {
            theme = newTheme;
            document.documentElement.setAttribute('data-theme', theme);
            fetchVerse(currentId);
        }

        function setMeaning(checked) {
            showMeaning = checked ? "true" : "false";
            document.querySelector('.meaning-text').style.display = checked ? "block" : "none";
            fetchVerse(currentId);
        }

        function navigate(direction) {
            if (direction === 'next' && currentId < totalVerses) {
                fetchVerse(currentId + 1);
            } else if (direction === 'prev' && currentId > 0) {
                fetchVerse(currentId - 1);
            }
        }

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") {
                navigate('next');
            } else if (e.key === "ArrowLeft") {
                navigate('prev');
            }
        });

        // Swipe Gestures
        let touchstartX = 0; // Changed to X for horizontal swipe
        let touchendX = 0;   // Changed to X for horizontal swipe

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX; 
        }, false);

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX; // Use screenX
            handleGesture();
        }, false);

        function handleGesture() {
            const threshold = 50; // minimum distance for a swipe
            if (touchendX < touchstartX - threshold) { // Swipe Left for Next
                navigate('next');
            }
            if (touchendX > touchstartX + threshold) { // Swipe Right for Previous
                navigate('prev');
            }
        }
    </script>
</body>
</html>
