<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ stotram_title }} - Stotra Reader</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="app-header">
        <h1>Sanatana Stotra Sangrahah</h1>
    </header>

    <div class="flashcard-page-container">
        <div class="controls-row">
            <a href="/" class="home-link" title="Home">🏠</a>
            <div class="language-toggle">
                <input type="radio" id="lang-sanskrit" name="selected_language" value="sanskrit" {% if selected_language == "sanskrit" %}checked{% endif %} onchange="setLanguage(this.value)">
                <label for="lang-sanskrit">S</label>
                <input type="radio" id="lang-malayalam" name="selected_language" value="malayalam" {% if selected_language == "malayalam" %}checked{% endif %} onchange="setLanguage(this.value)">
                <label for="lang-malayalam">M</label>
            </div>
        </div>

        <div class="flashcard">
            <div class="verse-id">#{{ current_id }}</div>
            <div class="script-text">{% if selected_language == "sanskrit" %}{{ verse.sanskrit }}{% else %}{{ verse.malayalam }}{% endif %}</div>
            <div class="english-text">{{ verse.english }}</div>
            <div class="meaning-text">{{ verse.meaning }}</div>
        </div>

        <div class="navigation-buttons"></div>
    </div>

    <footer class="app-footer">
        <p>© 2024 Sanatana Stotra Sangrahah • Author: Arunaj • May all be blessed.</p>
    </footer>

    <script>
        const stotramId = "{{ stotram_id }}";
        let currentId = {{ current_id }};
        const totalVerses = {{ total_verses }};
        let lang = "{{ selected_language }}";

        async function fetchVerse(vid) {
            const url = `/stotram/${stotramId}/flashcard/${vid}?lang=${lang}`;
            try {
                const response = await fetch(url, { headers: { 'Accept': 'application/json' } });
                const data = await response.json();
                
                currentId = data.current_id;
                
                // Update text content
                document.querySelector('.verse-id').textContent = `#${data.current_id}`;
                document.querySelector('.script-text').textContent = lang === 'sanskrit' ? data.verse.sanskrit : data.verse.malayalam;
                document.querySelector('.english-text').textContent = data.verse.english;
                document.querySelector('.meaning-text').textContent = data.verse.meaning;
                
                // Update URL without page refresh
                window.history.pushState({vid, lang}, '', url);
            } catch (error) {
                console.error("Failed to fetch verse:", error);
            }
        }

        function setLanguage(newLang) {
            lang = newLang;
            fetchVerse(currentId);
        }

        async function navigate(direction) {
            if (direction === 'next' && currentId < totalVerses) {
                await fetchVerse(currentId + 1);
            } else if (direction === 'prev' && currentId > 0) {
                await fetchVerse(currentId - 1);
            }
        }

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") {
                navigate('next');
            } else if (e.key === "ArrowLeft") {
                navigate('prev');
            }
        });

        // Swipe Gestures
        let touchstartX = 0; // Changed to X for horizontal swipe
        let touchendX = 0;   // Changed to X for horizontal swipe

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX; 
        }, false);

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX; // Use screenX
            handleGesture();
        }, false);

        function handleGesture() {
            const threshold = 50; // minimum distance for a swipe
            if (touchendX < touchstartX - threshold) { // Swipe Left for Next
                navigate('next');
            }
            if (touchendX > touchstartX + threshold) { // Swipe Right for Previous
                navigate('prev');
            }
        }
    </script>
</body>
</html>
